# NGINX CONFIG FOR WC.WEDEVS.SITE
# ================================================
# Add this to the HOST machine's nginx config.
# 
# Option 1: Add to /etc/nginx/conf.d/wc.wedevs.site.conf
# Option 2: Add to /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# After adding, run: sudo nginx -t && sudo systemctl reload nginx
# ================================================

server {
    listen 80;
    listen [::]:80;
    server_name wc.wedevs.site;

    # Proxy to the WC app running in Docker container
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cache static assets
        location ~* \.(css|js|woff2?|ttf|svg|png|jpg|gif|ico)$ {
            proxy_pass http://127.0.0.1:3200;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
